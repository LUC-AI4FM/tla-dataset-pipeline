name: Nightly Data Pipeline

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3]"
          pip install dvc

      - name: Run DVC pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc repro

      - name: Check for manifest changes
        id: check_changes
        run: |
          if git diff --quiet manifests/sources/sources_latest.jsonl; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit manifest changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifests/sources/sources_latest.jsonl manifests/sources/sources_latest_formatted.jsonl
          git commit -m "chore: update TLA+ dataset manifest [nightly pipeline]"
          git push

      - name: Push DVC metadata
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc push

      - name: Log pipeline results
        run: |
          echo "Pipeline execution completed!"
          echo "Stages run: discover → pull → push-to-s3"
          echo "Manifest: manifests/sources/sources_latest.jsonl"
          echo "Extracted files: data/raw/"
          echo "S3 bucket: luc-tla-datasets"
