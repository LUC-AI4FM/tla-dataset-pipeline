name: Nightly Discovery & Validation

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  discover-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run discovery pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tladata discover

      - name: Validate manifest
        run: |
          tladata validate-manifest \
            manifests/sources/sources_latest.jsonl \
            data_contracts/schemas/source_record.schema.json

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet manifests/sources/sources_latest.jsonl; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifests/sources/sources_latest.jsonl
          git commit -m "chore: update TLA+ dataset manifest [nightly discovery]"
          git push

      - name: Log results
        run: |
          echo "Discovery and validation completed successfully!"
          echo "Manifest location: manifests/sources/sources_latest.jsonl"
